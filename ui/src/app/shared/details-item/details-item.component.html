<div
  class="details-item details-item-clickable"
  [class.details-item-clickable]="clickable()"
  [class.details-item-invert-background]="invertBackground()"
  matRipple
  [matRippleDisabled]="!clickable()">
  <div class="details-header">{{ item() }}</div>
  <div class="details-line"><ng-content>{{ value() }}</ng-content></div>
</div>
