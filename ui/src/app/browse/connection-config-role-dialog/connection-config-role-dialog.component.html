<h2 mat-dialog-title>{{ data.connectionConfig.name }}</h2>

<mat-dialog-content>
  @if (data.connectionConfig.imageEmbedded || data.connectionConfig.imageUrl) {
    <div class="config-image-container">
      <img
        [src]="data.connectionConfig.imageEmbedded || data.connectionConfig.imageUrl"
        [alt]="data.connectionConfig.name"
        class="config-image"
      />
    </div>
  }

  <p class="description">{{ data.connectionConfig.description }}</p>

  <div class="links-section">
    <h3>Resources</h3>
    <ul class="links-list">
      <li>
        <a
          [href]="data.connectionConfig.href"
          target="_blank"
          rel="noopener noreferrer"
        >
          {{ data.connectionConfig.name }}
        </a>
      </li>
      @if (data.documentationUrl) {
        <li>
          <a
            [href]="data.documentationUrl"
            target="_blank"
            rel="noopener noreferrer"
          >
            Role documentation
          </a>
        </li>
      }
    </ul>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Close</button>
</mat-dialog-actions>
