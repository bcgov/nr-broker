<h2 mat-dialog-title>External Service</h2>

<mat-dialog-content>
  <app-external-service-card [connectionConfig]="data.connectionConfig" />
</mat-dialog-content>

<mat-dialog-actions align="end">
  @if (canViewDetails) {
    <button mat-button (click)="goToDetails()">
      View details
    </button>
  }
  <button mat-button mat-dialog-close>Close</button>
</mat-dialog-actions>
