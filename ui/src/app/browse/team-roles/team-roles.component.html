<p>Users are assigned to these roles when they need access to team resources or need to perform actions on behalf of the team.
  The chips on the right summarize each role's authorizations. Hover over a chip to see a quick description, then click it to view full details.</p>


<app-team-role-edges
  [edges]="edges"
  [teamRoleChipsEnabled]="teamRoleChipsEnabled"
  [connectionConfigChipsForRole]="getConnectionConfigChipsForRole()"
  [gitHubRoleByEdge]="getGitHubRole()"
  [brokerRoleByEdge]="getBrokerRole()"
  (connectionChipClick)="openConnectionConfigDialog($event)"
  (githubChipClick)="openConnectionConfigDialog(getGitHubConnectionConfigChip($event))"
  (brokerChipClick)="handleBrokerChipClick($event)"
/>
