<p>These are the roles available in NR Broker.</p>

@for (edge of edges; track edge.id) {
  <mat-divider></mat-divider>
  <h3 class="role-title">
    <span>{{ edge | edgetitle }}</span>
    <span class="role-chip-group">
      @if (getGitHubRole(edge) !== null) {
        <a
          class="github-role-chip"
          [href]="getGitHubRole(edge)!.url"
          target="_blank"
          rel="noopener noreferrer"
          matRipple
          [matTooltip]="getGitHubRole(edge)!.description"
        >
          <img src="assets/github.svg" class="github-role-icon" alt="" aria-hidden="true" />
          {{ getGitHubRole(edge)!.label }}
        </a>
      }
      @if (getBrokerChipInfo(edge) !== null) {
        <button
          type="button"
          class="broker-sudo-chip"
          matRipple
          [matTooltip]="'View Broker permission details for this role'"
          (click)="openBrokerRoleDialog(edge, getBrokerChipInfo(edge)!.label)"
        >
          <img src="assets/broker-bw.svg" class="broker-role-icon" alt="" aria-hidden="true" />
          {{ getBrokerChipInfo(edge)!.label }}
        </button>
      }
    </span>
  </h3>
  <p class="user-role-help">{{ edge.help }}</p>
}
