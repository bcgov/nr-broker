<button
  type="button"
  class="role-chip role-chip-button"
  matRipple
  [matTooltip]="tooltip() ? (productName() || label()) + ': ' + tooltip() : (productName() || label())"
>
  <span class="role-chip-content">
    <img [src]="iconSrc()" class="role-chip-icon" alt="" aria-hidden="true" />
    {{ label() }}
  </span>
</button>
